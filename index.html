<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6C63FF">
  <meta name="description" content="Learn Python, JavaScript, Java, HTML, and CSS through bite-sized challenges.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeQuest">
  <title>CodeQuest</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Google Fonts: Fira Code for the code editor -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap">

  <!-- Import map: CodeMirror 6 + language packs via esm.sh -->
  <script type="importmap">
  {
    "imports": {
      "style-mod":                   "https://esm.sh/style-mod@4.1.4",
      "w3c-keyname":                 "https://esm.sh/w3c-keyname@2.2.8",
      "crelt":                       "https://esm.sh/crelt@1.0.6",
      "@marijn/find-cluster-break":  "https://esm.sh/@marijn/find-cluster-break@1.0.2",
      "@lezer/common":               "https://esm.sh/@lezer/common@1.2.3",
      "@lezer/highlight":            "https://esm.sh/@lezer/highlight@1.2.1",
      "@lezer/lr":                   "https://esm.sh/@lezer/lr@1.4.2",
      "@lezer/python":               "https://esm.sh/@lezer/python@1.1.14",
      "@lezer/javascript":           "https://esm.sh/@lezer/javascript@1.4.21",
      "@lezer/java":                 "https://esm.sh/@lezer/java@1.1.2",
      "@lezer/html":                 "https://esm.sh/@lezer/html@1.3.10",
      "@lezer/css":                  "https://esm.sh/@lezer/css@1.1.9",
      "@codemirror/state":           "https://esm.sh/*@codemirror/state@6.5.1",
      "@codemirror/view":            "https://esm.sh/*@codemirror/view@6.36.3",
      "@codemirror/commands":        "https://esm.sh/*@codemirror/commands@6.8.0",
      "@codemirror/language":        "https://esm.sh/*@codemirror/language@6.10.8",
      "@codemirror/lang-python":     "https://esm.sh/*@codemirror/lang-python@6.1.9",
      "@codemirror/lang-javascript": "https://esm.sh/*@codemirror/lang-javascript@6.2.3",
      "@codemirror/lang-java":       "https://esm.sh/*@codemirror/lang-java@6.0.1",
      "@codemirror/lang-html":       "https://esm.sh/*@codemirror/lang-html@6.4.10",
      "@codemirror/lang-css":        "https://esm.sh/*@codemirror/lang-css@6.3.1",
      "@codemirror/theme-one-dark":  "https://esm.sh/*@codemirror/theme-one-dark@6.1.2",
      "@codemirror/autocomplete":    "https://esm.sh/*@codemirror/autocomplete@6.18.6",
      "codemirror":                  "https://esm.sh/*codemirror@6.0.1"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Loading CodeQuest…</p>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
